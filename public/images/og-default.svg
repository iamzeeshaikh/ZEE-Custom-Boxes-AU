<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2035"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(201,168,76,0.18)"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Gold accent bar -->
  <rect x="80" y="80" width="6" height="120" fill="#c9a84c" rx="3"/>
  <!-- Logo mark -->
  <rect x="80" y="240" width="72" height="72" rx="16" fill="#c9a84c"/>
  <text x="116" y="295" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#0d2035" text-anchor="middle">Z</text>
  <!-- Brand name -->
  <text x="172" y="278" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#ffffff">ZEE Custom Boxes AU</text>
  <text x="173" y="305" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#c9a84c" letter-spacing="4">PREMIUM PACKAGING AUSTRALIA</text>
  <!-- Headline -->
  <text x="80" y="390" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#ffffff">Custom Packaging for</text>
  <text x="80" y="450" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#c9a84c">Every Australian Business</text>
  <!-- Subtext -->
  <text x="80" y="510" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">Free Design · No Minimum Order · Fast AU-Wide Delivery</text>
  <!-- URL -->
  <text x="1120" y="590" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.45)" text-anchor="end">zeecustomboxes.com.au</text>
  <!-- Decorative line -->
  <line x1="80" y1="540" x2="600" y2="540" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
</svg>
